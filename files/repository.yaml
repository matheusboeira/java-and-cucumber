# The website pages will be mapped here.
#
# Make sure to use single quotes ('') instead
# of double quotes ("") to make copying
# XPath expressions easier.

LoginPage:
  txtEmail: '//*[@name="emailOrUsername"]'
  txtPassword: '//*[@name="password"]'
  btnLogin: '//*[@type="submit"]'
  txtEmailForgotPassword: ''
  btnForgotPassword: ''
  btnCloseForgotPassword: ''
  btnSendPasswordForgotPassword: ''
  btnCreateAccount: ''
  lblError: '//*[@id="root"]/section'
ProjectPage:
  lblUsername: '//*[@id="root"]/div/div[1]/div/div[1]/aside/div[2]/div[1]/button/div/div[2]/div[1]'
  btnOpen: ''
  btnEdit: ''
  btnAddMember: ''
  btnExportOverleaf: ''
